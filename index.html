<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TQM Life+ 7769 Present</title>
    <style>
        /* รีเซ็ตขอบและทำให้ iframe เต็มจอ 100% */
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #f3f4f6; }
        iframe { width: 100%; height: 100%; border: none; display: block; }
    </style>
</head>
<body>

    <iframe id="gas-iframe" src=""></iframe>

    <script>
        // 1. เอา URL Web App ของ GAS ที่ได้จากการ Deploy มาใส่ตรงนี้ครับอ้าย
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxpjUBvfIVhD1lkYoBEDwzS9gR5aTBrv2J67HIBaHL7qgmd2Ve7tDBVLakBw7_yzFt_/exec";

        // 2. ตรวจสอบ URL ของ GitHub Pages ว่ามีคำว่า ?page=admin ต่อท้ายหรือไม่
        const urlParams = new URLSearchParams(window.location.search);
        const pageType = urlParams.get('page');

        const iframe = document.getElementById('gas-iframe');

        // 3. สั่งให้ iframe โหลดหน้าตามเงื่อนไข
        if (pageType === 'admin') {
            // ส่ง parameter ต่อไปให้ GAS เพื่อดึงหน้า Superman.html
            iframe.src = GAS_WEB_APP_URL + "?page=admin";
        } else {
            // โหลดหน้า Index.html ปกติ
            iframe.src = GAS_WEB_APP_URL;
        }

        // ==============================================================
        // 🚀 ระบบช่วยจำรหัสผ่าน ทะลุกำแพง iPhone (iOS ITP Bypass)
        // ==============================================================
        
        // 4. ดักฟังคำสั่งจากหน้าเว็บด้านใน (GAS) ว่าล็อกอินหรือล็อกเอาท์
        window.addEventListener('message', function(event) {
            if (event.data && event.data.type === 'SAVE_SESSION') {
                // ถ้า GAS บอกว่า "ล็อกอินผ่านแล้ว ฝากจำด้วย" -> GitHub จะจำไว้ให้
                localStorage.setItem('tqm_master_session', event.data.data);
            } else if (event.data && event.data.type === 'CLEAR_SESSION') {
                // ถ้า GAS บอกว่า "ออกจากระบบแล้ว ลบทิ้งเลย" -> GitHub จะลบทิ้ง
                localStorage.removeItem('tqm_master_session');
            }
        });

        // 5. ทันทีที่ iframe โหลดเสร็จปุ๊บ ให้เช็คว่า GitHub จำใครไว้ไหม
        iframe.onload = function() {
            const savedSession = localStorage.getItem('tqm_master_session');
            if (savedSession) {
                // โยนข้อมูลที่จำไว้มุดทะลุ iframe กลับไปให้ GAS (GAS จะเอาไป Auto-Login ต่อเอง)
                iframe.contentWindow.postMessage({
                    type: 'INIT_SESSION', 
                    data: savedSession
                }, '*');
            }
        };
    </script>

</body>
</html>
